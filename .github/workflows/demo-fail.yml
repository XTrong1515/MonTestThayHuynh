name: Demo Fail Test (Tiêu chí 3 & 4)

on:
  workflow_dispatch:

jobs:
  demo-fail-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cài Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Chạy test CỐ Ý FAIL (Demo lab)
        working-directory: ./Lab11/selenium-framework
        run: mvn clean test -Dbrowser=chrome -DsuiteXmlFile=testng-demo-fail.xml
        continue-on-error: false
        env:
          APP_USERNAME: ${{ secrets.SAUCEDEMO_USERNAME }}
          APP_PASSWORD: ${{ secrets.SAUCEDEMO_PASSWORD }}

      - name: Upload artifact (screenshot khi test fail)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-fail-screenshots
          path: |
            Lab11/selenium-framework/target/surefire-reports/
            Lab11/selenium-framework/target/screenshots/
          retention-days: 7
